name: generate-pixel-profile-gif

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Generate terminal GIF
        run: |
          python generate_terminal.py

      - name: Download pixel-profile images
        run: |
          mkdir -p pixel-frames
          # Download the same image multiple times for simple animation
          for i in {1..3}; do
            curl -o "pixel-frames/frame_$i.png" "https://my-pixel-profile-nine.vercel.app/api/github-stats?username=Haaaiawd&theme=road_trip_crt&pixelate_avatar=true&screen_effect=true"
          done

      - name: Create pixel-profile GIF (16:9)
        run: |
          ffmpeg -hide_banner -loglevel error -r 2 -i pixel-frames/frame_%d.png -vf "scale=640:360" -loop 0 pixel-profile.gif

      - name: Merge pixel-profile and terminal GIFs (pixel-profile first)
        run: |
          ffmpeg -hide_banner -loglevel error -i pixel-profile.gif -i output.gif -filter_complex "[0:v][1:v]concat=n=2:v=1" -loop 0 pixel-profile.gif

      - name: Upload GIFs to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: output
          destination_dir: .
          force_orphan: true
