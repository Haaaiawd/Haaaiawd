name: generate-pixel-profile-gif

on:
  schedule:
    - cron: "0 */24 * * *"
  workflow_dispatch:
  push:
    branches:
      - master

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Download pixel-profile images with variations
        run: |
          mkdir -p frames
          # Download base image
          curl -o "frames/frame_1.png" "https://my-pixel-profile-nine.vercel.app/api/github-stats?username=Haaaiawd&theme=road_trip_crt&pixelate_avatar=true&screen_effect=true"
          # Create variations with color filters
          ffmpeg -hide_banner -loglevel error -i frames/frame_1.png -vf "hue=h=10:s=1.1" frames/frame_2.png
          ffmpeg -hide_banner -loglevel error -i frames/frame_1.png -vf "hue=h=20:s=1.2" frames/frame_3.png
          ffmpeg -hide_banner -loglevel error -i frames/frame_1.png -vf "hue=h=30:s=1.1" frames/frame_4.png
          ffmpeg -hide_banner -loglevel error -i frames/frame_1.png -vf "hue=h=15:s=1.15" frames/frame_5.png

      - name: Create animated GIF with autumn maple colors
        run: |
          ffmpeg -hide_banner -loglevel error -r 3 -i frames/frame_%d.png \
            -vf "scale=640:-1:flags=lanczos,eq=brightness=0.05:contrast=1.05:saturation=1.2" \
            -loop 0 \
            pixel-profile.gif

      - name: Upload GIF to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          publish_branch: output
          destination_dir: .
          force_orphan: true
